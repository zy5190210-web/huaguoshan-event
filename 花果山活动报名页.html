<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>花果山活动报名</title>
  <style>
    :root{--bg:#f6f8fa;--card:#fff;--accent:#ff6b6b;--muted:#6b7280}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; background:var(--bg); margin:0; padding:32px; display:flex; align-items:center; justify-content:center; min-height:100vh}
    .container{width:100%;max-width:760px}
    .card{background:var(--card);border-radius:12px;box-shadow:0 6px 20px rgba(11,15,30,.06);padding:28px}
    h1{margin:0 0 6px;font-size:20px}
    p.lead{margin:0 0 18px;color:var(--muted)}
    form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:flex;flex-direction:column;font-size:13px}
    input,select,textarea{padding:10px 12px;border:1px solid #e6e9ef;border-radius:8px;outline:none;font-size:14px}
    textarea{grid-column:1 / -1;min-height:100px;resize:vertical}
    .full{grid-column:1 / -1}
    .actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:12px}
    button{background:var(--accent);color:#fff;border:0;padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer}
    button.secondary{background:#fff;border:1px solid #e6e9ef;color:#111}
    .note{font-size:13px;color:var(--muted)}
    .success{background:#ecfdf5;border:1px solid #bbf7d0;padding:12px;border-radius:8px;color:#064e3b;margin-top:12px}
    @media (max-width:640px){form{grid-template-columns:1fr} .actions{justify-content:stretch}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>花果山 — 活动报名</h1>
      <p class="lead">欢迎报名本次花果山餐厅活动。请填写下面信息，我们收到后会通过电话或短信确认席位。</p>

      <form id="regForm" autocomplete="off">
        <label>姓名
          <input name="name" type="text" required placeholder="例如：张三" />
        </label>

        <label>手机（必填）
          <input name="phone" type="tel" inputmode="tel" pattern="[0-9+\- ()]{6,}" required placeholder="例如：+86 138 0000 0000" />
        </label>

        <label>电子邮箱
          <input name="email" type="email" placeholder="选填：用于接收报名确认邮件" />
        </label>

        <label>人数
          <select name="party_size" required>
            <option value="">请选择人数</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8+</option>
          </select>
        </label>

        <label class="full">希望到店日期和时间
          <input name="datetime" type="datetime-local" />
        </label>

        <label class="full">特殊要求 / 备注
          <textarea name="notes" placeholder="例如：靠窗、生日蛋糕、忌口等"></textarea>
        </label>

        <div class="full note">我们会在24小时内确认。请确保电话正确以便联系。</div>

        <div class="actions full">
          <button type="button" id="copyLink" class="secondary">复制报名链接</button>
          <button type="submit">提交报名</button>
        </div>

        <div id="msg" class="full" style="display:none"></div>
      </form>

      <div style="margin-top:14px;font-size:12px;color:var(--muted)">技术说明：此页面默认使用 JavaScript 将表单数据以 JSON POST 到你配置的后端地址（可替换为 Formspree / Netlify Forms / 自建 API）。</div>
    </div>
  </div>

  <script>
    // === 配置项：把 SUBMIT_URL 替换为你的接收表单的后端地址 ===
    // 推荐：使用 https://formspree.io/ 或 自建后端 POST /api/register
    const SUBMIT_URL = 'https://example.com/api/register'; // <-- 替换成你的接口或 Formspree 地址

    const form = document.getElementById('regForm');
    const msg = document.getElementById('msg');
    const copyLinkBtn = document.getElementById('copyLink');

    function showMessage(text, ok=true){
      msg.style.display = 'block';
      msg.className = ok ? 'success' : 'note';
      msg.textContent = text;
    }

    form.addEventListener('submit', async (e) =>{
      e.preventDefault();
      const data = new FormData(form);
      const payload = {};
      data.forEach((v,k)=> payload[k]=v);

      // basic client validation
      if(!payload.name || !payload.phone || !payload.party_size){
        showMessage('请填写必填项（姓名、手机、人数）。', false);
        return;
      }

      try{
        // 如果 SUBMIT_URL 包含 "formspree.io"，发送表单形式数据
        let res;
        if(SUBMIT_URL.includes('formspree.io')){
          // Formspree expects form-urlencoded or FormData
          const formData = new FormData();
          Object.keys(payload).forEach(k=> formData.append(k, payload[k]));
          res = await fetch(SUBMIT_URL, {method:'POST', body: formData});
        } else {
          res = await fetch(SUBMIT_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        }

        if(res.ok){
          form.reset();
          showMessage('已收到你的报名！我们会尽快与您确认。');
        } else {
          const txt = await res.text().catch(()=>res.statusText);
          showMessage('提交失败：' + (txt || res.status), false);
        }
      }catch(err){
        // 备用：弹出邮件方式
        showMessage('提交时发生网络错误。你也可以通过电话或邮箱直接联系我们。', false);
        console.error(err);
      }
    });

    // 复制当前页面链接（适合用于社交分享）
    copyLinkBtn.addEventListener('click', async ()=>{
      try{
        await navigator.clipboard.writeText(location.href);
        copyLinkBtn.textContent = '已复制链接';
        setTimeout(()=> copyLinkBtn.textContent = '复制报名链接',2000);
      }catch(e){
        alert('复制失败，请手动复制地址栏链接。');
      }
    });
  </script>
</body>
</html>
